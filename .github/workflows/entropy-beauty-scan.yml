name: Entropy Beauty + TruffleHog Scan

on:
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: read
  pull-requests: write   # needed to post comments

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (full history for TruffleHog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog (secrets + entropy filter)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown --filter-entropy=3.5 --json > trufflehog.json || true

      - name: Install Python + compute beauty entropy
        run: |
          python -m pip install numpy
          cat > /tmp/entropy.py << 'EOF'
import sys, math, json
from collections import Counter

def shannon_entropy(text):
    if not text or len(text) < 10: return 0.0
    freq = Counter(text)
    probs = [count / len(text) for count in freq.values()]
    return -sum(p * math.log2(p) for p in probs if p > 0)

# Get changed files in PR
import subprocess
changed = subprocess.check_output(['git', 'diff', '--name-only', 'origin/${{ github.base_ref }}...']).decode().splitlines()

results = []
total_ent = 0
count = 0
for f in changed:
    if not f or f.endswith(('.png','.jpg','.gif','.bin','.lock')): continue
    try:
        with open(f, 'r', encoding='utf-8', errors='ignore') as fh:
            content = fh.read()
        ent = shannon_entropy(content)
        results.append(f"{f}: {ent:.3f}")
        total_ent += ent
        count += 1
    except: pass

avg = total_ent / count if count else 0
verdict = "✅ Mid-4 beauty detected (thoughtful human code!)" if 4.3 <= avg <= 4.7 else \
          "⚠️  Consider review — entropy outside sweet spot" if avg > 0 else "No source files changed"

with open('/tmp/beauty.json', 'w') as f:
    json.dump({
        "average_entropy": round(avg, 3),
        "verdict": verdict,
        "files": results[:20]  # limit to avoid huge comment
    }, f)
EOF
          python /tmp/entropy.py

      - name: Post beautiful summary comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const fs = require('fs');
            let th = fs.existsSync('trufflehog.json') ? JSON.parse(fs.readFileSync('trufflehog.json', 'utf8')) : [];
            let beauty = JSON.parse(fs.readFileSync('/tmp/beauty.json', 'utf8'));

            let body = `## 🐷 TruffleHog + Entropy Beauty Scan\n\n`;
            body += `**Average entropy of changed code:** ${beauty.average_entropy} bits/char\n`;
            body += `**Verdict:** ${beauty.verdict}\n\n`;

            if (beauty.files.length) {
              body += `**Top changed files entropy:**\n\`\`\`\n${beauty.files.join('\n')}\n\`\`\`\n\n`;
            }

            if (th.length > 0) {
              body += `⚠️ **TruffleHog found ${th.length} potential issue(s)** (high-entropy strings or secrets)\n`;
            } else {
              body += `✅ No secrets or suspicious high-entropy blobs found.\n`;
            }

            body += `\n*Your mid-4 beauty heuristic in action — powered by the entropy chats we had! 😊*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
