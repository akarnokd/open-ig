name: Entropy Beauty + TruffleHog Scan

on:
  pull_request

permissions:
  contents: read
  pull-requests: write   # needed to post comments

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (full history for TruffleHog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: .                     # scan current directory (the PR)
          extra_args: --results=verified,unknown --filter-entropy=3.5 --json

      # ── Save the JSON output so we can use it in the comment step ──
      - name: Save TruffleHog output
        run: |
          # The action already ran; we just capture the JSON lines it printed
          cat << 'EOF' > trufflehog.json
          $(trufflehog git . --results=verified,unknown --filter-entropy=3.5 --no-update --json 2>/dev/null || echo "")
          EOF

      - name: Install Python + compute beauty entropy
        run: |
          python -m pip install numpy
          python .github/workflows/compute-entropy.py
      - name: Post beautiful summary comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const fs = require('fs');
            let th = fs.existsSync('trufflehog.json') ? JSON.parse(fs.readFileSync('trufflehog.json', 'utf8')) : [];
            let beauty = JSON.parse(fs.readFileSync('/tmp/beauty.json', 'utf8'));

            let body = `## 🐷 TruffleHog + Entropy Beauty Scan\n\n`;
            body += `**Average entropy of changed code:** ${beauty.average_entropy} bits/char\n`;
            body += `**Verdict:** ${beauty.verdict}\n\n`;

            if (beauty.files.length) {
              body += `**Top changed files entropy:**\n\`\`\`\n${beauty.files.join('\n')}\n\`\`\`\n\n`;
            }

            if (th.length > 0) {
              body += `⚠️ **TruffleHog found ${th.length} potential issue(s)** (high-entropy strings or secrets)\n`;
            } else {
              body += `✅ No secrets or suspicious high-entropy blobs found.\n`;
            }

            body += `\n*Your mid-4 beauty heuristic in action — powered by the entropy chats we had! 😊*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
